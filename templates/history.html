<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
</head>
<body>

<h2>Scan History</h2>

<div id="history"></div>

<script>
fetch("/history")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("history");

    data.forEach(scan => {
        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
            <h3>${scan.target}</h3>
            <p><b>IP:</b> ${scan.ip}</p>
            <p><b>Status:</b> ${scan.website_status}</p>
            <p><b>OS:</b> ${scan.detected_os}</p>
            <p><b>Date:</b> ${scan.created_at}</p>
        `;

        container.appendChild(div);
    });
});
</script>

</body>
</html>
