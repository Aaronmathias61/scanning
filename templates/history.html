<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
</head>
<body>

<h2>Scan History</h2>

<div id="history"></div>

<script>
fetch("/history")
.then(res => {
    if (!res.ok) {
        throw new Error("Not authorized or server error");
    }
    return res.json();
})
.then(data => {
    const container = document.getElementById("history");

    if (!Array.isArray(data)) {
        container.innerHTML = "<p>No data found</p>";
        return;
    }

    data.forEach(scan => {
        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
            <h3>${scan.target}</h3>
            <p><b>IP:</b> ${scan.ip}</p>
            <p><b>Status:</b> ${scan.website_status}</p>
            <p><b>OS:</b> ${scan.detected_os}</p>
            <p><b>Date:</b> ${scan.created_at}</p>
        `;

        container.appendChild(div);
    });
})
.catch(err => {
    document.getElementById("history").innerHTML =
        "<p style='color:red;'>Failed to load history. Please login again.</p>";
});
</script>

</body>
</html>
